name: Update knockout results

# Runs every 4 hours, but only acts during the tournament window
# (16 Jun – 20 Jul 2026). Outside that range every run is a quick no-op.
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check tournament window
        id: window
        run: |
          TODAY=$(date -u +%F)
          if [[ "$TODAY" < "2026-06-16" || "$TODAY" > "2026-07-20" ]]; then
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "Outside 2026-06-16..2026-07-20 ($TODAY) — skipping."
          else
            echo "active=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.window.outputs.active == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.window.outputs.active == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        if: steps.window.outputs.active == 'true'
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Resolve newly decided teams
        if: steps.window.outputs.active == 'true'
        working-directory: backend
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          PYTHONPATH: .
        run: python scripts/update_results.py

      - name: Commit data changes
        id: commit
        if: steps.window.outputs.active == 'true'
        run: |
          CHANGED="$(git status --porcelain backend/app/data/results.json frontend/public/data/fixtures.json)"
          if [[ -n "$CHANGED" ]]; then
            git config user.name "wc2026-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add backend/app/data/results.json frontend/public/data/fixtures.json
            git commit -m "Update knockout results"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data changes to commit."
          fi

      # A push made by GITHUB_TOKEN doesn't trigger the deploy workflow, so kick it off.
      - name: Trigger deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
